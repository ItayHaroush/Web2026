            align-items: center;

            padding: 1rem;

        .te-decor {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .te-blob {
            position: absolute;
            border-radius: 9999px;
            filter: blur(48px);
            opacity: 0.2;
            mix-blend-mode: multiply;
            width: min(42vw, 17rem);
            height: min(42vw, 17rem);
        }

        .te-blob.a {
            top: -8%;
            inset-inline-start: -8%;
            background: #a855f7;
        }

        .te-blob.b {
            top: -8%;
            inset-inline-end: -8%;
            background: #f97316;
        }

        .te-blob.c {
            bottom: -8%;
            inset-inline-start: 15%;
            background: #ec4899;
        }

        .te-card-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 28rem;
            margin-inline: auto;
        }

        .te-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
        }

        .te-logo-wrap {
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .te-logo-ring {
            width: 8rem;
            height: 8rem;
            margin-inline: auto;
            background: #fff;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,.1);
            margin-bottom: 0.5rem;
            padding: 0.5rem;
        }

        .te-logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: breath 3s ease-in-out infinite;
        }

        .te-chip {
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: #f3f4f6;
            border-radius: 9999px;
            padding: 0.375rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4b5563;
        }

        .te-chip-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            background: #22c55e;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .6; transform: scale(.9); }
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2)); }
        }

        .te-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #111827;
            margin: 0 0 0.75rem;
            letter-spacing: -0.02em;
        }

        .te-lead {
            color: #6b7280;
            font-size: 1.125rem;
            line-height: 1.625;
            margin: 0 0 2rem;
        }

        .te-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 700;
            border-radius: 1rem;
            padding: 1rem 2rem;
            font-size: 1.0625rem;
            text-decoration: none;
            transition: box-shadow .2s ease, transform .15s ease, opacity .15s ease;
            box-shadow: 0 20px 25px -5px rgba(249,115,22,.25);
        }

        .te-btn-primary {
            margin-top: 0;
            color: #fff;
            background-image: linear-gradient(to left, #e11d48, #f97316);
        }

        .te-btn-primary:hover {

        }

        .te-btn-primary:active {
            transform: scale(.98);
        }

        .te-btn-primary.te-muted {
            background-image: none;
            background: linear-gradient(to left, #374151, #111827);
            box-shadow: 0 8px 12px rgba(0,0,0,.18);
        }

        .te-btn-secondary {
            margin-top: 1rem;
            background: #f3f4f6;
            color: #374151;
            font-weight: 600;
            padding: 0.75rem 1.25rem;
            font-size: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,.08);
            border-radius: 0.75rem;
        }

        .te-btn-secondary:hover {
            background: #e5e7eb;
            box-shadow: 0 6px 10px rgba(0,0,0,.12);
        }

        .te-btn-secondary:active {
            transform: scale(.98);
        }

        .te-icon {
            width: 1.5rem;
            height: 1.5rem;
            flex-shrink: 0;
        }

        .te-icon-sm {
            width: 1.25rem;
            height: 1.25rem;
        }

        .te-helper {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #f3f4f6;
        }

        .te-helper-title {
            font-size: 0.8125rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin: 0 0 1rem;
        }

        .te-helper-rows {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #4b5563;
            background: #f9fafb;
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: right;
            flex-wrap: wrap;
        }

        .te-helper-rows > div {
            flex: 1 1 45%;

        .te-divider-v {

        .te-foot {

        .te-strong {

        .te-soft {

        .loader-wrap {

        .loader {

            border-radius: 50%;

            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

<body>

    <!-- JavaScript Logic (Preserved & Enhanced) -->
    <script>
        // #region agent log
        window.onerror = function(m, u, l) {
          fetch('http://127.0.0.1:7917/ingest/8df4a825-2af7-44b5-b28d-f1fe14cba861',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0d5f3e'},body:JSON.stringify({sessionId:'0d5f3e',location:'open.html:bottom-script-onerror',runId:'preload',hypothesisId:'H-B',message:String(m||''),timestamp:Date.now()})}).catch(function(){});
        };
        fetch('http://127.0.0.1:7917/ingest/8df4a825-2af7-44b5-b28d-f1fe14cba861',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0d5f3e'},body:JSON.stringify({sessionId:'0d5f3e',location:'open.html:body-script-start',runId:'preload',hypothesisId:'H-B',message:'open_bottom_script_ran_after_dom',data:{},timestamp:Date.now()})}).catch(function(){});
        // #endregion agent log

        // קריאת target מה-URL או fallback לדף הבית
        const params = new URLSearchParams(window.location.search);
        const targetUrl = decodeURIComponent(params.get('target') || '') || 'https://www.takeeat.co.il';

        // OS Detection
        const ua = navigator.userAgent;
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isAndroid = /Android/i.test(ua);

        const btn = document.getElementById('openBtn');
        const btnText = document.getElementById('btnText');
        const continueBtn = document.getElementById('continueBtn');

        // Continue Button Handler
        if(continueBtn) {
            continueBtn.addEventListener('click', function() {
                sessionStorage.setItem('fb-redirect-attempted', 'true');

                const params2 = new URLSearchParams(window.location.search);
                const fallbackMode = params2.get('fallback');
                const targetFromUrl = decodeURIComponent(params2.get('target') || '');

                if (fallbackMode === 'same' && targetFromUrl) {
                    window.location.href = targetFromUrl;
                } else {
                    window.location.href = window.location.origin + '/';
                }
            });
        }

        function updateButtonText() {
            if (isIOS) {
                btnText.textContent = 'פתח ב-Safari';
            } else if (isAndroid) {
                btnText.textContent = 'פתח ב-Chrome';
            } else {
                btnText.textContent = 'מעבר לאתר';
            }
        }

        if(btnText) updateButtonText();

        // Click Handler
        if(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();

                btnText.innerHTML = '<span class="loader-wrap"><span class="loader"></span><span>פותח...</span></span>';
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.92';

                if (isIOS) {
                    var chromeUrl = 'googlechrome://' + targetUrl.replace(/^https?:\/\//, '');
                    window.location.href = chromeUrl;

                    setTimeout(function() {
                        sessionStorage.setItem('fb-redirect-attempted', 'true');
                        window.location.href = targetUrl;
                    }, 2500);

                } else if (isAndroid) {
                    var intent = 'intent://' + targetUrl.replace(/^https?:\/\//, '') +
                                   '#Intent;scheme=https;package=com.android.chrome;end';
                    window.location.href = intent;

                    setTimeout(function() {
                        sessionStorage.setItem('fb-redirect-attempted', 'true');
                        window.location.href = targetUrl;
                    }, 2500);

                } else {
                    sessionStorage.setItem('fb-redirect-attempted', 'true');
                    window.open(targetUrl, '_blank') || (window.location.href = targetUrl);
                }

                setTimeout(function() {
                    btnText.textContent = '⚠️ השתמש בתפריט למעלה ↗';
                    btn.classList.add('te-muted');
                    btn.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';
                }, 3500);
            });
        }
    </script>
